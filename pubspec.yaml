name: swanlife
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  get_storage: ^2.1.1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  flutter_svg: ^2.2.4
  firebase_storage: ^13.4.1
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  path: ^1.9.1
  record: ^6.2.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.2
  audioplayers: ^6.1.0
  firebase_messaging: ^16.2.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  flutter_gen_runner: ^5.13.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/

flutter_gen:
  output: lib/gen/
  line_length: 80
